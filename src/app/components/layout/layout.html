<div class="flex h-screen bg-bg-primary overflow-hidden">
  <!-- Sidebar (Nav) -->
  <aside class="w-20 lg:w-60 bg-bg-secondary border-r border-border flex flex-col transition-all duration-300">
    <div class="p-6 flex items-center gap-3">
      <div class="w-9 h-9 bg-accent rounded-lg flex items-center justify-center text-white shadow-lg shadow-accent/20">
        <mat-icon class="text-xl">fitness_center</mat-icon>
      </div>
      <h1 class="hidden lg:block text-lg font-black text-text-main tracking-tight font-display">IRONCORE</h1>
    </div>

    <nav class="flex-1 space-y-1 mt-4">
      <div class="hidden lg:block px-6 pb-2 text-[10px] font-bold text-text-dim uppercase tracking-widest opacity-50">Main Controls</div>
      @for (item of navItems; track item.path) {
        <a 
          [routerLink]="item.path" 
          routerLinkActive="sleek-nav-item-active"
          class="sleek-nav-item group"
        >
          <mat-icon class="text-xl group-hover:scale-110 transition-transform">{{ item.icon }}</mat-icon>
          <div class="hidden lg:flex flex-col text-left">
            <span class="leading-none tracking-tight">{{ item.label }}</span>
            <span class="text-[9px] text-text-dim mt-0.5">{{ item.arabic }}</span>
          </div>
        </a>
      }
    </nav>

    <div class="p-4 mt-auto border-t border-border bg-black/20">
      <div class="hidden lg:flex flex-col gap-1 px-2 mb-4">
        <div class="flex items-center gap-2 text-[10px] text-text-dim font-medium">
          <span class="w-2 h-2 rounded-full bg-green"></span>
          Offline Ready
        </div>
        <div class="text-[9px] text-text-dim/60 font-mono">127.0.0.1:5432</div>
      </div>
      
      <button (click)="auth.logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red/80 font-bold hover:bg-red/10 transition-all group text-sm">
        <mat-icon class="text-lg group-hover:rotate-12 transition-transform">logout</mat-icon>
        <span class="hidden lg:block text-xs uppercase tracking-wider">Logout</span>
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col min-w-0">
    <!-- Header -->
    <header class="h-16 bg-bg-secondary border-b border-border flex items-center justify-between px-6 shrink-0">
      <div class="flex items-center gap-5">
        <div class="hidden sm:flex items-center gap-2 px-3 py-1.5 bg-green/10 border border-green/20 rounded-full">
          <span class="w-2 h-2 rounded-full bg-green animate-pulse"></span>
          <span class="text-[10px] font-bold text-green uppercase tracking-wider">Shift Active: Alikhaled010</span>
        </div>
      </div>

      <div class="flex items-center gap-4">
        <div class="text-right hidden sm:block">
          <p class="text-xs font-bold text-text-main leading-tight">Admin Terminal</p>
          <p class="text-[10px] text-text-dim font-medium uppercase tracking-tighter">Super Admin Role</p>
        </div>
        <div class="w-9 h-9 rounded-full bg-accent flex items-center justify-center text-white font-black text-xs shadow-lg shadow-accent/20">AK</div>
      </div>
    </header>

    <!-- Scrollable content -->
    <main class="flex-1 overflow-y-auto relative p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
